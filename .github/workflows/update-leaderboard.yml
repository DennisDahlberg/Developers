name: Update Leaderboard

on:
  repository_dispatch:
    types: [update-leaderboard]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate and update leaderboard
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'public/leaderboard.json';

            // Read current leaderboard
            let data = { scores: [] };
            try {
              data = JSON.parse(fs.readFileSync(path, 'utf8'));
              if (!Array.isArray(data.scores)) data.scores = [];
            } catch (e) {
              core.info('No existing leaderboard.json, creating new one');
            }

            // Extract and validate payload
            const payload = context.payload.client_payload || {};
            const name = String(payload.name || '').trim().slice(0, 30);
            const score = Math.max(0, Math.min(9999, parseInt(payload.score, 10) || 0));
            const streak = Math.max(0, Math.min(9999, parseInt(payload.streak, 10) || 0));
            const accuracy = Math.max(0, Math.min(100, parseInt(payload.accuracy, 10) || 0));

            if (!name || score <= 0) {
              core.setFailed('Invalid payload: name and score > 0 required');
              return;
            }

            // Sanitize name (alphanumeric, spaces, underscores, hyphens only)
            const safeName = name.replace(/[^a-zA-Z0-9 _\-]/g, '').trim();
            if (!safeName) {
              core.setFailed('Invalid name after sanitization');
              return;
            }

            // Add new entry
            data.scores.push({
              name: safeName,
              score: score,
              streak: streak,
              accuracy: accuracy,
              date: new Date().toISOString(),
            });

            // Sort by score descending, keep top 100
            data.scores.sort((a, b) => b.score - a.score || b.streak - a.streak);
            data.scores = data.scores.slice(0, 100);

            // Write back
            fs.writeFileSync(path, JSON.stringify(data, null, 2) + '\n');
            core.info(`Added score: ${safeName} = ${score} words`);

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/leaderboard.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "🏆 Update leaderboard"
          git push
