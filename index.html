<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Developers</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body class="bg-neutral-950 text-white min-h-full flex flex-col items-center justify-start py-16 px-4">

  <h1 class="text-4xl font-bold tracking-widest uppercase mb-2">Developers</h1>
  <p class="text-neutral-400 text-sm mb-10">Video Player</p>

  <div id="playerWrapper" class="w-full max-w-4xl rounded-2xl overflow-hidden shadow-2xl bg-neutral-900 ring-1 ring-white/10">
    <video
      id="videoPlayer"
      class="w-full block"
      controls
      muted
      playsinline
    >
      Your browser does not support the video tag.
    </video>

    <!-- Empty state shown when no video is loaded -->
    <div id="emptyState" class="flex flex-col items-center justify-center py-24">
      <svg class="w-16 h-16 text-neutral-600 mb-4" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M15.75 10.5l4.72-4.72a.75.75 0 011.28.53v11.38a.75.75 0 01-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 002.25-2.25v-9A2.25 2.25 0 0013.5 5.25h-9A2.25 2.25 0 002.25 7.5v9A2.25 2.25 0 004.5 18.75z" />
      </svg>
      <p class="text-neutral-500 text-sm">No video loaded yet</p>
    </div>
  </div>

  <div class="mt-8 flex flex-col items-center gap-3">
    <p class="text-neutral-500 text-xs uppercase tracking-widest">Load a video from your device</p>
    <label
      for="fileInput"
      class="cursor-pointer bg-blue-600 hover:bg-blue-500 active:bg-blue-700 transition-colors text-white font-semibold px-6 py-2.5 rounded-lg text-sm"
    >
      Choose Video File
    </label>
    <input type="file" id="fileInput" accept="video/*" class="hidden" />
  </div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
