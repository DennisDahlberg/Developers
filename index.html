<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Developers</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #0f0f0f;
      color: #ffffff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    p.subtitle {
      color: #aaaaaa;
      margin-bottom: 36px;
      font-size: 1rem;
    }

    .video-container {
      width: 100%;
      max-width: 900px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.6);
      background: #1a1a1a;
    }

    video {
      width: 100%;
      display: block;
    }

    .upload-section {
      margin-top: 30px;
      text-align: center;
    }

    .upload-section p {
      color: #888;
      margin-bottom: 12px;
      font-size: 0.9rem;
    }

    label.upload-btn {
      cursor: pointer;
      background: #1e90ff;
      color: #fff;
      padding: 10px 24px;
      border-radius: 6px;
      font-size: 0.95rem;
      transition: background 0.2s;
    }

    label.upload-btn:hover {
      background: #1570cd;
    }

    input[type="file"] {
      display: none;
    }
  </style>
</head>
<body>

  <h1>Developers</h1>
  <p class="subtitle">Video Player</p>

  <div class="video-container">
    <video id="videoPlayer" controls autoplay muted>
      <!-- Replace the src below with your video file, e.g. src="video.mp4" -->
      <source id="videoSource" src="" type="video/mp4" />
      Your browser does not support the video tag.
    </video>
  </div>

  <div class="upload-section">
    <p>Or load a video from your device:</p>
    <label class="upload-btn" for="fileInput">Choose Video File</label>
    <input type="file" id="fileInput" accept="video/*" />
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const videoPlayer = document.getElementById('videoPlayer');

    fileInput.addEventListener('change', function () {
      const file = this.files[0];
      if (file) {
        const url = URL.createObjectURL(file);
        videoPlayer.src = url;
        videoPlayer.play();
      }
    });
  </script>

</body>
</html>
